<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskBoard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="app-header">
        <h1>TaskBoard</h1>
        <button id="add-task-btn" class="btn btn-primary">Новая задача</button>
    </header>

    <main>
        <div id="filters-container" class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="todo">К выполнению <span id="counter-todo" class="counter">0</span></button>
            <button class="filter-btn" data-filter="in-progress">В работе <span id="counter-in-progress" class="counter">0</span></button>
            <button class="filter-btn" data-filter="done">Выполнено <span id="counter-done" class="counter">0</span></button>
        </div>

        <div id="task-board" class="board">
            <div class="column" data-status="todo">
                <h2 class="column-title">К выполнению</h2>
                <div class="tasks-container" data-status-container="todo"></div>
            </div>
            <div class="column" data-status="in-progress">
                <h2 class="column-title">В работе</h2>
                <div class="tasks-container" data-status-container="in-progress"></div>
            </div>
            <div class="column" data-status="done">
                <h2 class="column-title">Выполнено</h2>
                <div class="tasks-container" data-status-container="done"></div>
            </div>
        </div>
    </main>

    <div id="modal-overlay" class="modal-overlay hidden"></div>
    <div id="task-modal" class="modal hidden" role="dialog" aria-labelledby="modal-title" aria-modal="true">
        <div class="modal-header">
            <h3 id="modal-title">Новая задача</h3>
            <button id="close-modal-btn" class="close-btn" aria-label="Закрыть модальное окно">&times;</button>
        </div>
        <div class="modal-body">
            <form id="task-form">
                <div class="form-group">
                    <label for="task-title">Название</label>
                    <input type="text" id="task-title" name="title" required>
                    <p id="title-error" class="error-message" aria-live="polite"></p>
                </div>
                <div class="form-group">
                    <label for="task-description">Описание</label>
                    <textarea id="task-description" name="description" rows="4"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Создать</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
